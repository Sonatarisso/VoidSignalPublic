name: "ABYSSAL_CONTAGION_BUILD"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: install dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          tagName: v__VERSION__ # the action will replace this with the version from package.json
          releaseName: "Void Signal Lab v__VERSION__ [ABYSSAL_SINGULARITY]"
          releaseBody: "THE VOID IS EXPANDING. DO NOT PROCESS THE SIGNALS."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
